<div class="min-h-screen flex flex-col max-w-2xl mx-auto w-full font-sans text-neutral-900 antialiased overflow-x-hidden">
  <header class="flex justify-between items-baseline px-4 sm:px-8 pt-8 sm:pt-10 pb-6 sm:pb-8 border-b border-neutral-200">
    <!-- routerLink (no brackets) = static string destination — navigates without a full page reload. -->
    <a routerLink="/" class="text-base font-semibold tracking-tight text-neutral-900 no-underline">{{ displayedTitle() }}@if (isTyping()) {<span class="typing-cursor">|</span>}</a>
    <nav class="flex gap-3 sm:gap-4 items-baseline">
      <!-- auth.isLoggedIn() reads an Angular Signal. Angular tracks this read and
           automatically re-evaluates this @if block whenever the signal changes —
           no manual subscription or change detection trigger needed. -->
      @if (auth.isLoggedIn()) {
        <button (click)="onLogout()" class="text-xs font-bold uppercase tracking-widest text-orange-600 hover:text-orange-800 transition-colors">Logout</button>
      }
    </nav>
  </header>

  <main class="flex-1 min-w-0">
    <!-- <router-outlet> is the placeholder where Angular renders the component
         that matches the current URL (defined in app.routes.ts).
         When the user navigates, only this area re-renders — the header and footer stay. -->
    <router-outlet />
  </main>

  <footer class="px-4 sm:px-8 py-8 border-t border-neutral-200 text-xs text-neutral-300 tracking-wide">
    &copy; 2026 Carlo
  </footer>
</div>
