<div class="px-4 sm:px-8 py-8 sm:py-12 max-w-lg w-full">
  <!-- Ternary expression in template interpolation — shows a different heading depending on mode. -->
  <h1 class="text-xl font-semibold mb-8">
    {{ isEdit ? 'Post bearbeiten' : 'Neuer Post' }}
  </h1>

  <!-- #postForm="ngForm" — template reference variable.
       FormsModule attaches an NgForm directive to every <form> element and exposes it
       under the name "ngForm". We capture it as `postForm` so we can pass it to
       onSubmit() and call form.control.markAllAsTouched() to trigger all validation
       messages at once when the user submits an incomplete form. -->
  <form #postForm="ngForm" (ngSubmit)="onSubmit(postForm)" class="space-y-5">
    <div>
      <label class="block text-xs uppercase tracking-widest text-neutral-400 mb-1">Titel *</label>
      <!-- #titleField="ngModel" — template reference to this field's NgModel instance.
           Exposes .invalid (has errors) and .touched (user has focused + blurred it).
           We use these below to show the red border and error message only after the
           user has actually interacted with the field — not immediately on page load. -->
      <!-- [class.border-red-400]="..." — Angular adds the CSS class only when the
           expression is true, and removes it when false. This drives the error highlight. -->
      <input
        [(ngModel)]="title"
        name="title"
        required
        #titleField="ngModel"
        class="w-full border rounded px-3 py-2 text-sm focus:outline-none"
        [class.border-red-400]="titleField.invalid && titleField.touched"
        [class.border-neutral-200]="!(titleField.invalid && titleField.touched)"
        [class.focus:border-neutral-900]="!(titleField.invalid && titleField.touched)"
      />
      @if (titleField.invalid && titleField.touched) {
        <p class="text-red-500 text-xs mt-1">Titel ist erforderlich.</p>
      }
    </div>

    <div>
      <label class="block text-xs uppercase tracking-widest text-neutral-400 mb-1">Inhalt</label>
      <!-- quill-editor is the ngx-quill component — a rich-text WYSIWYG editor.
           [(ngModel)] syncs the HTML string to the `content` property.
           (onContentChanged) is a Quill-specific output event that fires on every
           keystroke; we update `content` directly from it because Quill's ngModel
           binding can occasionally lag behind rapid typing. -->
      <quill-editor
        [(ngModel)]="content"
        name="content"
        [modules]="quillModules"
        (onContentChanged)="content = $event.html ?? ''"
        class="w-full"
      ></quill-editor>
    </div>

    <div>
      <label class="block text-xs uppercase tracking-widest text-neutral-400 mb-1">Autor *</label>
      <input
        [(ngModel)]="author"
        name="author"
        required
        #authorField="ngModel"
        class="w-full border rounded px-3 py-2 text-sm focus:outline-none"
        [class.border-red-400]="authorField.invalid && authorField.touched"
        [class.border-neutral-200]="!(authorField.invalid && authorField.touched)"
        [class.focus:border-neutral-900]="!(authorField.invalid && authorField.touched)"
      />
      @if (authorField.invalid && authorField.touched) {
        <p class="text-red-500 text-xs mt-1">Autor ist erforderlich.</p>
      }
    </div>

    <!-- Checkbox with two-way binding — no template reference needed since there's no validation. -->
    <label class="flex items-center gap-2 text-sm">
      <input type="checkbox" [(ngModel)]="isPublished" name="isPublished" />
      Veröffentlicht
    </label>

    <div class="flex gap-3 pt-2">
      <button
        type="submit"
        class="bg-neutral-900 text-white text-sm px-6 py-2 rounded hover:bg-neutral-700 transition-colors"
      >
        {{ isEdit ? 'Speichern' : 'Erstellen' }}
      </button>
      <!-- type="button" prevents this from accidentally triggering (ngSubmit) on the form. -->
      <button
        type="button"
        (click)="onCancel()"
        class="text-sm text-neutral-400 hover:text-neutral-900 transition-colors"
      >
        Abbrechen
      </button>
    </div>
  </form>
</div>
